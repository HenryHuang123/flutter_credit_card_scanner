name: flutter_credit_card_scanner
description: "A Flutter package that utilizes the device camera to scan and extract credit card information. by using Google ML for Android and Apple Vision for iOS."
version: 0.12.0
homepage: https://github.com/nimr77/Flutter_credit_card_scanner

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.28.0"

dependencies:
  camera: ">=0.11.1 <0.11.2+1"          # 0.11.1/0.11.2 → Flutter 3.27
  camera_android_camerax: ">=0.6.13 <0.6.17+1"   # 0.6.17 is last at Flutter 3.27 (0.6.17+1 → 3.29)
  camera_avfoundation: ">=0.9.18 <0.9.21+2"      # 0.9.21+1 is last at Flutter 3.27 (0.9.21+2 → 3.29)
  camera_platform_interface: ">=2.10.0 <2.11.0" # 2.10.x → Flutter 3.22
  camera_web: ">=0.3.3 <0.3.5+1"               # avoid 3.5+4 (3.38)
  flutter_plugin_android_lifecycle: ">=2.0.2 <2.0.30"  # avoid 2.0.35 (3.38)
  apple_vision_commons: ^0.0.3
  # Forked to run Vision text recognition on a background queue instead of the
  # platform main thread (upstream 0.0.4 blocks the UI thread, janking the
  # camera preview whenever text is in frame).
  apple_vision_recognize_text:
    git:
      url: https://github.com/HenryHuang123/apple_vision.git
      ref: 404f47c86285ad262be9c93c563b69fa50c4288a
      path: packages/apple_vision_recognize_text
  credit_card_validator: ^2.1.0

  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.example.flutter_credit_card_scanner
        pluginClass: CreditCardScannerPlugin
      ios:
        pluginClass: CreditCardScannerPlugin
publish_to: none